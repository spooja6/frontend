<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNIST Digit Classifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .header p {
      font-size: 0.875rem;
      color: #6b6b80;
      margin-top: 0.4rem;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b6b80;
      margin-bottom: 1rem;
    }

    /* Canvas drawing area */
    .canvas-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    #draw-canvas {
      border-radius: 10px;
      border: 1.5px solid #2e2e45;
      cursor: crosshair;
      touch-action: none;
      background: #000;
      display: block;
    }

    .canvas-actions {
      display: flex;
      gap: 0.6rem;
      width: 100%;
    }

    .btn {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 9px;
      border: 1px solid #2e2e45;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-ghost {
      background: transparent;
      color: #9090a8;
    }
    .btn-ghost:hover { background: #22222e; border-color: #3a3a50; color: #e8e8f0; }

    .btn-primary {
      background: #6c63ff;
      color: #fff;
      border-color: #6c63ff;
    }
    .btn-primary:hover { background: #7b74ff; border-color: #7b74ff; }
    .btn-primary:disabled { background: #2e2e45; border-color: #2e2e45; color: #5a5a70; cursor: not-allowed; transform: none; }

    /* Upload tab */
    .tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
    }

    .tab {
      padding: 0.45rem 1rem;
      border-radius: 7px;
      border: 1px solid transparent;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: #6b6b80;
    }

    .tab.active {
      background: #22222e;
      border-color: #2e2e45;
      color: #e8e8f0;
    }
    .tab:not(.active):hover { color: #b0b0c8; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Upload area */
    .upload-zone {
      border: 1.5px dashed #2e2e45;
      border-radius: 10px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #6c63ff;
      background: #1f1f2e;
    }
    .upload-zone svg { margin-bottom: 0.75rem; opacity: 0.5; }
    .upload-zone p { font-size: 0.875rem; color: #6b6b80; }
    .upload-zone span { color: #6c63ff; }
    #file-input { display: none; }

    #upload-preview {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    #upload-preview img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid #2e2e45;
      background: #000;
    }

    /* API URL input */
    .api-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .api-row input {
      flex: 1;
      background: #12121a;
      border: 1px solid #2e2e45;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-size: 0.8rem;
      color: #e8e8f0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    .api-row input:focus { border-color: #6c63ff; }
    .api-row input::placeholder { color: #444458; }

    /* Result area */
    #result-card {
      display: none;
      text-align: center;
    }

    .result-digit {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      color: #6c63ff;
      margin-bottom: 0.5rem;
    }

    .result-label {
      font-size: 0.8rem;
      color: #6b6b80;
      margin-bottom: 1rem;
    }

    .confidence-bar-wrap {
      background: #12121a;
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
      margin: 0.4rem 0 0.3rem;
    }
    .confidence-bar {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #6c63ff, #a78bfa);
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .confidence-pct {
      font-size: 0.78rem;
      color: #9090a8;
    }

    .error-msg {
      background: #2a1515;
      border: 1px solid #4a2020;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.825rem;
      color: #f08080;
      display: none;
    }

    .spinner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      color: #6b6b80;
      font-size: 0.85rem;
      padding: 0.5rem 0;
    }
    .spinner svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pen-size-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #1f1f2e;
    }
    .pen-size-row label { font-size: 0.78rem; color: #6b6b80; }
    .pen-size-row input[type=range] {
      flex: 1;
      accent-color: #6c63ff;
    }
    .pen-size-row span { font-size: 0.78rem; color: #9090a8; min-width: 20px; }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>Digit Classifier</h1>
    <p>Draw or upload a handwritten digit (0–9)</p>
  </div>

  <!-- API URL -->
  <div class="card">
    <div class="section-label">API endpoint</div>
    <div class="api-row">
      <input id="api-url" type="text" placeholder="https://your-app.onrender.com" spellcheck="false" />
    </div>
  </div>

  <!-- Input card -->
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('draw')">Draw</button>
      <button class="tab" onclick="switchTab('upload')">Upload image</button>
    </div>

    <!-- Draw panel -->
    <div class="tab-panel active" id="tab-draw">
      <div class="canvas-wrapper">
        <canvas id="draw-canvas" width="280" height="280"></canvas>
        <div class="canvas-actions">
          <button class="btn btn-ghost" onclick="clearCanvas()">Clear</button>
          <button class="btn btn-primary" id="btn-predict-draw" onclick="predictDraw()">Classify →</button>
        </div>
        <div class="pen-size-row">
          <label>Pen size</label>
          <input type="range" min="8" max="32" value="18" id="pen-size" oninput="penSizeOut.textContent=this.value" />
          <span id="penSizeOut">18</span>
        </div>
      </div>
    </div>

    <!-- Upload panel -->
    <div class="tab-panel" id="tab-upload">
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="handleDrop(event)">
        <svg width="36" height="36" fill="none" stroke="#fff" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M12 16V8m0 0-3 3m3-3 3 3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 16.5V18a2 2 0 002 2h14a2 2 0 002-2v-1.5" stroke-linecap="round"/>
        </svg>
        <p>Drop an image here or <span>browse</span></p>
        <p style="font-size:0.75rem;margin-top:4px;color:#444458">PNG, JPG — white digit on black background</p>
        <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)" />
      </div>
      <div id="upload-preview">
        <img id="preview-img" src="" alt="preview" />
        <div class="canvas-actions">
          <button class="btn btn-ghost" onclick="resetUpload()">Remove</button>
          <button class="btn btn-primary" id="btn-predict-upload" onclick="predictUpload()">Classify →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="spinner" id="spinner">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
    </svg>
    Classifying…
  </div>

  <!-- Error -->
  <div class="error-msg" id="error-msg"></div>

  <!-- Result -->
  <div class="card" id="result-card">
    <div class="section-label">Prediction</div>
    <div class="result-digit" id="result-digit">—</div>
    <div class="result-label">Detected digit</div>
    <div class="confidence-bar-wrap">
      <div class="confidence-bar" id="conf-bar" style="width:0%"></div>
    </div>
    <div class="confidence-pct" id="conf-pct">—</div>
  </div>
</div>

<script>
  const canvas = document.getElementById('draw-canvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let lastX = 0, lastY = 0;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 280, 280);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 18;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const scaleX = canvas.width / r.width;
    const scaleY = canvas.height / r.height;
    if (e.touches) {
      return [(e.touches[0].clientX - r.left) * scaleX, (e.touches[0].clientY - r.top) * scaleY];
    }
    return [(e.clientX - r.left) * scaleX, (e.clientY - r.top) * scaleY];
  }

  canvas.addEventListener('mousedown', e => { drawing = true; [lastX, lastY] = getPos(e); });
  canvas.addEventListener('mousemove', e => {
    if (!drawing) return;
    const [x, y] = getPos(e);
    ctx.lineWidth = parseInt(document.getElementById('pen-size').value);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
    [lastX, lastY] = [x, y];
  });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);

  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; [lastX, lastY] = getPos(e); });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!drawing) return;
    const [x, y] = getPos(e);
    ctx.lineWidth = parseInt(document.getElementById('pen-size').value);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
    [lastX, lastY] = [x, y];
  });
  canvas.addEventListener('touchend', () => drawing = false);

  function clearCanvas() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 280, 280);
    hideResult();
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'draw')));
    document.getElementById('tab-draw').classList.toggle('active', tab === 'draw');
    document.getElementById('tab-upload').classList.toggle('active', tab === 'upload');
    hideResult();
  }

  let uploadedFile = null;
  function handleFile(e) { loadFile(e.target.files[0]); }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('upload-zone').classList.remove('drag-over');
    loadFile(e.dataTransfer.files[0]);
  }
  function loadFile(file) {
    if (!file) return;
    uploadedFile = file;
    const url = URL.createObjectURL(file);
    document.getElementById('preview-img').src = url;
    document.getElementById('upload-zone').style.display = 'none';
    document.getElementById('upload-preview').style.display = 'flex';
    hideResult();
  }
  function resetUpload() {
    uploadedFile = null;
    document.getElementById('upload-zone').style.display = 'block';
    document.getElementById('upload-preview').style.display = 'none';
    document.getElementById('file-input').value = '';
    hideResult();
  }

  function getApiUrl() {
    const base = document.getElementById('api-url').value.trim().replace(/\/$/, '');
    return base ? base + '/predict' : null;
  }

  function showLoading(on) {
    document.getElementById('spinner').style.display = on ? 'flex' : 'none';
    document.getElementById('btn-predict-draw').disabled = on;
    document.getElementById('btn-predict-upload').disabled = on;
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('result-card').style.display = 'none';
  }

  function hideResult() {
    document.getElementById('result-card').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
  }

  function showResult(digit, confidence) {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('result-card').style.display = 'block';
    document.getElementById('result-digit').textContent = digit;
    const pct = Math.round(confidence * 100);
    document.getElementById('conf-bar').style.width = pct + '%';
    document.getElementById('conf-pct').textContent = pct + '% confidence';
  }

  function canvasToPixels() {
    const offscreen = document.createElement('canvas');
    offscreen.width = 28; offscreen.height = 28;
    const oc = offscreen.getContext('2d');
    oc.drawImage(canvas, 0, 0, 28, 28);
    const data = oc.getImageData(0, 0, 28, 28).data;
    const pixels = [];
    for (let i = 0; i < data.length; i += 4) pixels.push(data[i] / 255);
    return pixels;
  }

  async function predictDraw() {
    const url = getApiUrl();
    if (!url) { showError('Please enter your API URL above.'); return; }
    showLoading(true); hideResult();
    try {
      const pixels = canvasToPixels();
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: pixels })
      });
      if (!res.ok) { const t = await res.text(); throw new Error(`Server error ${res.status}: ${t}`); }
      const data = await res.json();
      showResult(data.prediction, data.confidence ?? 1);
    } catch (e) {
      showError(e.message || 'Request failed. Check your API URL and CORS settings.');
    } finally { showLoading(false); }
  }

  async function predictUpload() {
    const url = getApiUrl();
    if (!url) { showError('Please enter your API URL above.'); return; }
    if (!uploadedFile) { showError('No image selected.'); return; }
    showLoading(true); hideResult();
    try {
      const pixels = await imageFileToPixels(uploadedFile);
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: pixels })
      });
      if (!res.ok) { const t = await res.text(); throw new Error(`Server error ${res.status}: ${t}`); }
      const data = await res.json();
      showResult(data.prediction, data.confidence ?? 1);
    } catch (e) {
      showError(e.message || 'Request failed.');
    } finally { showLoading(false); }
  }

  function imageFileToPixels(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const oc = document.createElement('canvas');
        oc.width = 28; oc.height = 28;
        const c = oc.getContext('2d');
        c.drawImage(img, 0, 0, 28, 28);
        const data = c.getImageData(0, 0, 28, 28).data;
        const pixels = [];
        for (let i = 0; i < data.length; i += 4) pixels.push(data[i] / 255);
        URL.revokeObjectURL(url);
        resolve(pixels);
      };
      img.onerror = () => reject(new Error('Failed to load image'));
      img.src = url;
    });
  }
</script>
</body>
</html>
